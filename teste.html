<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dot Calendar</title>
<style>
    body {
        margin: 0;
        background: #f2f2f2;
        font-family: Arial, sans-serif;
    }

    .frame {
        width: 90%;
        max-width: 1000px;
        margin: 80px auto;
        padding: 40px;
        background: #e9e9e9;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(52, 1fr);
        gap: 8px;
        margin-bottom: 40px;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #d0d0d0;
        transition: 0.2s;
        cursor: pointer;
    }

    .dot:hover {
        background: #888;
        transform: scale(1.2);
    }

    .dot.active {
        background: #4a90e2;
    }

    .months {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #7a8aa0;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .line {
        height: 2px;
        background: #999;
        width: 100%;
        opacity: 0.4;
    }
</style>
</head>
<body>

<div class="frame">
    <div class="grid" id="grid"></div>

    <div class="months">
        <span>JAN</span>
        <span>FEV</span>
        <span>MAR</span>
        <span>ABR</span>
        <span>MAI</span>
        <span>JUN</span>
        <span>JUL</span>
        <span>AGO</span>
        <span>SET</span>
        <span>OUT</span>
        <span>NOV</span>
        <span>DEZ</span>
    </div>

    <div class="line"></div>
</div>

<script>
    const grid = document.getElementById("grid");

    const startDate = new Date(new Date().getFullYear(), 0, 1); // 1º de janeiro

    for (let i = 0; i < 365; i++) {
        const dot = document.createElement("div");
        dot.classList.add("dot");

        // cria a data baseada no índice
        const currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + i);

        // formata a data (ex: 10 Abr 2026)
        const formattedDate = currentDate.toLocaleDateString("pt-BR", {
            day: "2-digit",
            month: "short",
            year: "numeric"
        });

        // tooltip nativo
        dot.title = formattedDate;

        dot.addEventListener("click", () => {
            dot.classList.toggle("active");
        });

        grid.appendChild(dot);
    }
</script>

</body>
</html>
