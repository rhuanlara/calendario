<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dot Calendar</title>
<style>
    body {
        margin: 0;
        background: #f2f2f2;
        font-family: Arial, sans-serif;
    }

    .frame {
        width: 95%;
        max-width: 1100px;
        margin: 40px auto;
        padding: clamp(16px, 4vw, 40px);
        background: #e9e9e9;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(8px, 1fr));
        gap: clamp(4px, 1vw, 10px);
        margin-bottom: 30px;
    }

    .dot {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        background: #d0d0d0;
        transition: 0.2s;
        cursor: pointer;
    }

    .dot:hover {
        background: #888;
        transform: scale(1.2);
    }

    .dot.active {
        background: #9c9c9c;
    }

    .months {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        font-size: clamp(10px, 1.5vw, 12px);
        color: #7a8aa0;
        letter-spacing: 1px;
        margin-bottom: 10px;
        text-align: center;
    }

    .line {
        height: 2px;
        background: #999;
        width: 100%;
        opacity: 0.4;
    }

    /* 📱 Ajustes mobile */
    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(auto-fit, minmax(6px, 1fr));
        }

        .dot:hover {
            transform: none; /* evita bug de zoom no mobile */
        }
    }
    .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 10px;
    flex-wrap: wrap;
}

#monthFilter {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #e3e3e3;
    font-size: 14px;
    cursor: pointer;
}

#counter {
    font-size: 14px;
    color: #333;
    font-weight: 500;
}
</style></head>
<body>
<div class="frame">

    <div class="header">
        <select id="monthFilter">
            <option value="0">Janeiro</option>
            <option value="1">Fevereiro</option>
            <option value="2">Março</option>
            <option value="3">Abril</option>
            <option value="4">Maio</option>
            <option value="5">Junho</option>
            <option value="6">Julho</option>
            <option value="7">Agosto</option>
            <option value="8">Setembro</option>
            <option value="9">Outubro</option>
            <option value="10">Novembro</option>
            <option value="11">Dezembro</option>
        </select>

        <div id="counter">0 dias completos</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="line"></div>

</div>

<script>
    const grid = document.getElementById("grid");
    const monthFilter = document.getElementById("monthFilter");
    const counter = document.getElementById("counter");

    const year = new Date().getFullYear();
    const savedData = JSON.parse(localStorage.getItem("dotCalendar")) || {};

    const monthNames = [
        "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
        "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
    ];

    // 🔹 Preenche o select dinamicamente
    monthNames.forEach((name, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = name;
        monthFilter.appendChild(option);
    });

    function renderMonth(month) {
        grid.innerHTML = "";

        let total = 0;

        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(year, month, day);
            const dateKey = date.toISOString().split("T")[0];

            const dot = document.createElement("div");
            dot.classList.add("dot");

            dot.title = date.toLocaleDateString("pt-BR", {
                day: "2-digit",
                month: "short",
                year: "numeric"
            });

            if (savedData[dateKey]) {
                dot.classList.add("active");
                total++;
            }

            dot.addEventListener("click", () => {
                dot.classList.toggle("active");

                if (dot.classList.contains("active")) {
                    savedData[dateKey] = true;
                } else {
                    delete savedData[dateKey];
                }

                localStorage.setItem("dotCalendar", JSON.stringify(savedData));

                updateCounter(month);
            });

            grid.appendChild(dot);
        }

        updateCounter(month);
    }

    function updateCounter(month) {
        let total = 0;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(year, month, day);
            const dateKey = date.toISOString().split("T")[0];

            if (savedData[dateKey]) total++;
        }

        counter.innerText = `${total} / ${daysInMonth} dias`;
    }

    monthFilter.addEventListener("change", (e) => {
        renderMonth(parseInt(e.target.value));
    });

    // 🔥 inicia no mês atual
    const currentMonth = new Date().getMonth();
    monthFilter.value = currentMonth;
    renderMonth(currentMonth);
</script>
</body>
</html>
